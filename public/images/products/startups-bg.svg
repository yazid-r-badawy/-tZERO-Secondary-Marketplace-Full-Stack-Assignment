<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="startupsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#startupsGrad)"/>
  
  <!-- Movie Camera Icon -->
  <rect x="50" y="60" width="60" height="40" rx="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="80" cy="80" r="15" fill="rgba(255,255,255,0.3)"/>
  <circle cx="80" cy="80" r="8" fill="rgba(0,0,0,0.3)"/>
  <rect x="100" y="70" width="8" height="20" rx="2" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Film Strip -->
  <rect x="140" y="50" width="80" height="100" fill="rgba(0,0,0,0.3)"/>
  <rect x="150" y="60" width="60" height="20" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="150" y="90" width="60" height="20" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="150" y="120" width="60" height="20" rx="2" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Rocket/Startup Icon -->
  <path d="M250,200 L260,160 L270,200 Z" fill="rgba(255,255,255,0.3)"/>
  <rect x="255" y="160" width="10" height="40" fill="rgba(255,255,255,0.3)"/>
  <circle cx="260" cy="200" r="8" fill="rgba(255,255,255,0.25)"/>
  <path d="M250,200 L245,210 L255,210 Z" fill="rgba(255,255,255,0.3)"/>
  <path d="M270,200 L275,210 L265,210 Z" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Light Bulb/Idea Icon -->
  <circle cx="320" cy="80" r="20" fill="rgba(255,255,255,0.25)"/>
  <rect x="315" y="100" width="10" height="15" rx="2" fill="rgba(255,255,255,0.25)"/>
  <path d="M310,100 L330,100 L325,95 L315,95 Z" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Film Reel -->
  <circle cx="100" cy="200" r="25" fill="rgba(255,255,255,0.2)"/>
  <circle cx="100" cy="200" r="15" fill="rgba(0,0,0,0.3)"/>
  <circle cx="100" cy="200" r="5" fill="rgba(255,255,255,0.3)"/>
  <line x1="100" y1="175" x2="100" y2="225" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="75" y1="200" x2="125" y2="200" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Clapperboard -->
  <rect x="180" y="180" width="50" height="40" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="180" y="180" width="50" height="15" fill="rgba(0,0,0,0.4)"/>
  <line x1="205" y1="195" x2="205" y2="220" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
  
  <!-- Star Icons -->
  <path d="M340,200 L345,210 L355,210 L348,217 L350,227 L340,222 L330,227 L332,217 L325,210 L335,210 Z" 
        fill="rgba(255,255,255,0.3)"/>
  <path d="M60,120 L63,128 L71,128 L65,133 L67,141 L60,137 L53,141 L55,133 L49,128 L57,128 Z" 
        fill="rgba(255,255,255,0.25)"/>
</svg>
