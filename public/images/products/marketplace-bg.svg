<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="marketplaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#marketplaceGrad)"/>
  
  <!-- Trading Chart Lines -->
  <path d="M20,250 L60,200 L100,180 L140,160 L180,140 L220,120 L260,100 L300,90 L340,85 L380,80" 
        stroke="rgba(255,255,255,0.3)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M20,270 L60,240 L100,220 L140,200 L180,180 L220,160 L260,140 L300,130 L340,125 L380,120" 
        stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Stock Market Symbols -->
  <rect x="50" y="50" width="40" height="30" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="70" y="70" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12" font-weight="bold">NYSE</text>
  
  <rect x="120" y="60" width="40" height="30" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="140" y="80" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12" font-weight="bold">NASDAQ</text>
  
  <rect x="190" y="45" width="40" height="30" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="210" y="65" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10" font-weight="bold">tZERO</text>
  
  <!-- Price Indicators -->
  <circle cx="280" cy="80" r="15" fill="rgba(0,255,136,0.4)"/>
  <text x="280" y="85" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">↑</text>
  
  <circle cx="320" cy="100" r="15" fill="rgba(255,100,100,0.4)"/>
  <text x="320" y="105" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">↓</text>
  
  <!-- Trading Volume Bars -->
  <rect x="60" y="200" width="8" height="30" fill="rgba(255,255,255,0.25)"/>
  <rect x="75" y="190" width="8" height="40" fill="rgba(255,255,255,0.25)"/>
  <rect x="90" y="210" width="8" height="20" fill="rgba(255,255,255,0.25)"/>
  <rect x="105" y="185" width="8" height="45" fill="rgba(255,255,255,0.25)"/>
  <rect x="120" y="195" width="8" height="35" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Currency Symbols -->
  <text x="300" y="200" fill="rgba(255,255,255,0.3)" font-size="24" font-weight="bold">$</text>
  <text x="330" y="220" fill="rgba(255,255,255,0.25)" font-size="20" font-weight="bold">€</text>
  <text x="360" y="240" fill="rgba(255,255,255,0.2)" font-size="18" font-weight="bold">£</text>
</svg>
