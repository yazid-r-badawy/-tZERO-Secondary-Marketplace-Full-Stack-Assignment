<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="offeringsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#offeringsGrad)"/>
  
  <!-- Company Building Icons -->
  <rect x="40" y="80" width="50" height="50" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="50" y="90" width="30" height="30" fill="rgba(255,255,255,0.3)"/>
  <rect x="55" y="100" width="20" height="20" fill="rgba(255,255,255,0.4)"/>
  
  <rect x="120" y="60" width="50" height="50" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="130" y="70" width="30" height="30" fill="rgba(255,255,255,0.3)"/>
  <rect x="135" y="80" width="20" height="20" fill="rgba(255,255,255,0.4)"/>
  
  <rect x="200" y="100" width="50" height="50" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="210" y="110" width="30" height="30" fill="rgba(255,255,255,0.3)"/>
  <rect x="215" y="120" width="20" height="20" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Growth Arrow -->
  <path d="M280,200 L300,160 L320,200" stroke="rgba(255,255,255,0.4)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="300" y1="160" x2="300" y2="240" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Investment Icons -->
  <circle cx="340" cy="80" r="20" fill="rgba(255,255,255,0.25)"/>
  <text x="340" y="88" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="16" font-weight="bold">$</text>
  
  <circle cx="360" cy="120" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="360" y="128" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="bold">%</text>
  
  <!-- Document/Contract Icons -->
  <rect x="60" y="200" width="30" height="40" rx="2" fill="rgba(255,255,255,0.2)"/>
  <line x1="65" y1="210" x2="85" y2="210" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="65" y1="220" x2="85" y2="220" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="65" y1="230" x2="75" y2="230" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  
  <!-- Handshake/Partnership Icon -->
  <circle cx="150" cy="220" r="25" fill="rgba(255,255,255,0.15)"/>
  <path d="M135,215 Q140,210 145,215 Q150,220 155,215" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
</svg>
