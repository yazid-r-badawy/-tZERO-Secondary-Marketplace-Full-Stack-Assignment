<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blocktradeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#blocktradeGrad)"/>
  
  <!-- Trading Arrows -->
  <path d="M50,100 L100,50 L150,100" stroke="rgba(255,255,255,0.4)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="50" r="8" fill="rgba(255,255,255,0.5)"/>
  
  <path d="M200,200 L250,150 L300,200" stroke="rgba(255,255,255,0.35)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="250" cy="150" r="8" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Exchange Icon -->
  <rect x="120" y="60" width="60" height="40" rx="4" fill="rgba(255,255,255,0.2)"/>
  <line x1="130" y1="75" x2="170" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="130" y1="85" x2="170" y2="85" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M150,60 L160,50 L170,60" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
  <path d="M150,100 L160,110 L170,100" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
  
  <!-- Transaction Blocks -->
  <rect x="60" y="180" width="50" height="50" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="65" y="185" width="40" height="15" fill="rgba(255,255,255,0.4)"/>
  <line x1="65" y1="210" x2="105" y2="210" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="65" y1="220" x2="95" y2="220" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <rect x="130" y="190" width="50" height="50" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="135" y="195" width="40" height="15" fill="rgba(255,255,255,0.4)"/>
  <line x1="135" y1="220" x2="175" y2="220" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="135" y1="230" x2="165" y2="230" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- Swap Arrows -->
  <path d="M220,120 L240,100 M240,100 L260,120 M240,100 L240,80" 
        stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M280,180 L300,160 M300,160 L320,180 M300,160 L300,140" 
        stroke="rgba(255,255,255,0.35)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Large Block Trade Indicator -->
  <rect x="250" y="220" width="80" height="50" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="290" y="245" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="bold">BLOCK</text>
  <text x="290" y="260" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="bold">TRADE</text>
  
  <!-- Volume Indicator -->
  <rect x="320" y="60" width="8" height="60" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="335" y="50" width="8" height="70" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="350" y="55" width="8" height="65" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
