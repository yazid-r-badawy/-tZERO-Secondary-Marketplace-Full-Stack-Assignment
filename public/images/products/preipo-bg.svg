<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="preipoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#preipoGrad)"/>
  
  <!-- Growth Chart -->
  <path d="M40,240 L80,200 L120,180 L160,150 L200,120 L240,100 L280,90 L320,85 L360,80" 
        stroke="rgba(255,255,255,0.5)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M40,240 L80,200 L120,180 L160,150 L200,120 L240,100 L280,90 L320,85 L360,80 L360,240 L40,240 Z" 
        fill="rgba(255,255,255,0.15)"/>
  
  <!-- IPO Bell -->
  <path d="M280,60 Q290,50 300,60 Q310,50 320,60 L320,80 Q310,90 300,80 Q290,90 280,80 Z" 
        fill="rgba(255,255,255,0.3)"/>
  <line x1="300" y1="60" x2="300" y2="40" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="300" cy="35" r="5" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Star Icons -->
  <path d="M80,80 L85,95 L100,95 L88,105 L93,120 L80,110 L67,120 L72,105 L60,95 L75,95 Z" 
        fill="rgba(255,255,255,0.4)"/>
  <path d="M140,100 L143,110 L153,110 L145,117 L148,127 L140,120 L132,127 L135,117 L127,110 L137,110 Z" 
        fill="rgba(255,255,255,0.35)"/>
  <path d="M200,70 L203,80 L213,80 L205,87 L208,97 L200,90 L192,97 L195,87 L187,80 L197,80 Z" 
        fill="rgba(255,255,255,0.4)"/>
  
  <!-- Dollar Sign -->
  <circle cx="340" cy="200" r="25" fill="rgba(255,255,255,0.25)"/>
  <text x="340" y="210" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="24" font-weight="bold">$</text>
  
  <!-- Trophy/Award Icon -->
  <path d="M60,180 L80,160 L100,180 L100,220 L60,220 Z" fill="rgba(255,255,255,0.3)"/>
  <rect x="70" y="220" width="20" height="10" rx="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="80" cy="170" r="8" fill="rgba(255,215,0,0.6)"/>
  
  <!-- Upward Trend Arrow -->
  <path d="M250,200 L270,160 L290,200" stroke="rgba(255,255,255,0.5)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="270" y1="160" x2="270" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Company Valuation -->
  <rect x="120" y="220" width="60" height="40" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="240" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="12" font-weight="bold">VALUATION</text>
  <text x="150" y="255" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">$1B+</text>
</svg>
