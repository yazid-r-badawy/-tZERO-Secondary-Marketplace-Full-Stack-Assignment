<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#0a1a2e"/>
  
  <!-- Multiple Chain Networks -->
  <g transform="translate(200, 150)">
    <!-- Network 1 - Left -->
    <circle cx="-80" cy="0" r="30" fill="none" stroke="rgba(0, 255, 136, 0.4)" stroke-width="2"/>
    <circle cx="-80" cy="0" r="20" fill="none" stroke="rgba(0, 255, 136, 0.3)" stroke-width="1.5"/>
    <circle cx="-80" cy="0" r="10" fill="rgba(0, 255, 136, 0.6)"/>
    <circle cx="-100" cy="-20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="-60" cy="-20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="-100" cy="20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="-60" cy="20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <line x1="-80" y1="0" x2="-100" y2="-20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    <line x1="-80" y1="0" x2="-60" y2="-20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    <line x1="-80" y1="0" x2="-100" y2="20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    <line x1="-80" y1="0" x2="-60" y2="20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    
    <!-- Network 2 - Center -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="rgba(0, 255, 136, 0.5)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="rgba(0, 255, 136, 0.4)" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="-20" cy="-25" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="20" cy="-25" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="-20" cy="25" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="20" cy="25" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <line x1="0" y1="0" x2="-20" y2="-25" stroke="rgba(0, 255, 136, 0.25)" stroke-width="1"/>
    <line x1="0" y1="0" x2="20" y2="-25" stroke="rgba(0, 255, 136, 0.25)" stroke-width="1"/>
    <line x1="0" y1="0" x2="-20" y2="25" stroke="rgba(0, 255, 136, 0.25)" stroke-width="1"/>
    <line x1="0" y1="0" x2="20" y2="25" stroke="rgba(0, 255, 136, 0.25)" stroke-width="1"/>
    
    <!-- Network 3 - Right -->
    <circle cx="80" cy="0" r="30" fill="none" stroke="rgba(0, 255, 136, 0.4)" stroke-width="2"/>
    <circle cx="80" cy="0" r="20" fill="none" stroke="rgba(0, 255, 136, 0.3)" stroke-width="1.5"/>
    <circle cx="80" cy="0" r="10" fill="rgba(0, 255, 136, 0.6)"/>
    <circle cx="60" cy="-20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="100" cy="-20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="60" cy="20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <circle cx="100" cy="20" r="4" fill="rgba(0, 255, 136, 0.7)"/>
    <line x1="80" y1="0" x2="60" y2="-20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    <line x1="80" y1="0" x2="100" y2="-20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    <line x1="80" y1="0" x2="60" y2="20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    <line x1="80" y1="0" x2="100" y2="20" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
    
    <!-- Connecting Lines Between Networks -->
    <line x1="-50" y1="0" x2="-35" y2="0" stroke="rgba(0, 255, 136, 0.3)" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="35" y1="0" x2="50" y2="0" stroke="rgba(0, 255, 136, 0.3)" stroke-width="2" stroke-dasharray="4,4"/>
  </g>
</svg>
