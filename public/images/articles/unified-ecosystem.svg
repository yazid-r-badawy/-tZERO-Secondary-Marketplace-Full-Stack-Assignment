<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:rgba(0, 255, 136, 0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0, 255, 136, 0);stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#0a1a2e"/>
  
  <!-- Globe/Wireframe Structure -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="rgba(0, 255, 136, 0.4)" stroke-width="2"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="rgba(0, 255, 136, 0.3)" stroke-width="1.5"/>
  <circle cx="200" cy="150" r="40" fill="none" stroke="rgba(0, 255, 136, 0.5)" stroke-width="2"/>
  
  <!-- Grid Lines -->
  <line x1="120" y1="150" x2="280" y2="150" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
  <line x1="200" y1="70" x2="200" y2="230" stroke="rgba(0, 255, 136, 0.2)" stroke-width="1"/>
  <line x1="150" y1="100" x2="250" y2="200" stroke="rgba(0, 255, 136, 0.15)" stroke-width="1"/>
  <line x1="250" y1="100" x2="150" y2="200" stroke="rgba(0, 255, 136, 0.15)" stroke-width="1"/>
  
  <!-- Data Points -->
  <circle cx="160" cy="120" r="3" fill="rgba(0, 255, 136, 0.8)"/>
  <circle cx="240" cy="120" r="3" fill="rgba(0, 255, 136, 0.8)"/>
  <circle cx="180" cy="180" r="3" fill="rgba(0, 255, 136, 0.8)"/>
  <circle cx="220" cy="180" r="3" fill="rgba(0, 255, 136, 0.8)"/>
  <circle cx="140" cy="150" r="3" fill="rgba(0, 255, 136, 0.8)"/>
  <circle cx="260" cy="150" r="3" fill="rgba(0, 255, 136, 0.8)"/>
  
  <!-- Connecting Lines -->
  <line x1="200" y1="150" x2="160" y2="120" stroke="rgba(0, 255, 136, 0.3)" stroke-width="1"/>
  <line x1="200" y1="150" x2="240" y2="120" stroke="rgba(0, 255, 136, 0.3)" stroke-width="1"/>
  <line x1="200" y1="150" x2="180" y2="180" stroke="rgba(0, 255, 136, 0.3)" stroke-width="1"/>
  <line x1="200" y1="150" x2="220" y2="180" stroke="rgba(0, 255, 136, 0.3)" stroke-width="1"/>
  
  <!-- Numbers/Data Labels -->
  <text x="170" y="115" fill="rgba(0, 255, 136, 0.6)" font-size="10" font-family="monospace">77.5</text>
  <text x="245" y="115" fill="rgba(0, 255, 136, 0.6)" font-size="10" font-family="monospace">80.8</text>
  <text x="185" y="175" fill="rgba(0, 255, 136, 0.6)" font-size="10" font-family="monospace">64.3</text>
</svg>
